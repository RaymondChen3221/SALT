<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SALT 关系倾向测试</title>
  <link rel="stylesheet" href="styles.css">
  <script src="data/result_types.js" defer></script>
  <script src="data/result_profiles.js" defer></script>
  <script src="data/role_images.js" defer></script>
  <script src="data/support_profiles.js" defer></script>
  <script src="assets/art_manifest.js" defer></script>
  <script src="questions.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="background-art" id="backgroundArt" aria-hidden="true"></div>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">SALT v4</p>
        <h1>SALT 关系倾向测试</h1>
      </div>
      <div class="top-actions">
        <span class="question-count" id="questionCount">0 / 44</span>
        <button class="ghost-button" id="restartTopButton" type="button">重新开始</button>
      </div>
    </header>

    <div class="progress-track" aria-hidden="true">
      <span class="progress-fill" id="progressFill"></span>
    </div>

    <section class="workspace">
      <aside class="overview-panel">
        <div class="art-window" id="artWindow">
          <img id="sideArtImage" alt="">
          <div class="art-placeholder" id="artPlaceholder">
            <span>SALT</span>
          </div>
          <div class="role-art-meta hidden" id="roleArtMeta">
            <span id="roleArtName"></span>
            <button class="role-art-switch" id="roleArtSwitch" type="button">切换</button>
          </div>
        </div>
        <div class="axis-stack" aria-label="SALT 维度">
          <span><strong>S</strong> 特殊性</span>
          <span><strong>A</strong> 兑现力</span>
          <span><strong>L</strong> 长程性</span>
          <span><strong>T</strong> 双向性</span>
        </div>
      </aside>

      <section class="glass-panel quiz-panel" id="quizPanel" aria-live="polite">
        <h2 class="question-text" id="questionText">题目载入中</h2>
        <div class="option-grid" id="optionGrid"></div>
        <div class="panel-actions">
          <button class="ghost-button" id="backButton" type="button">返回</button>
          <button class="primary-button" id="nextButton" type="button">下一题</button>
        </div>
      </section>

      <section class="glass-panel result-panel hidden" id="resultPanel" aria-live="polite">
        <div class="result-card" id="resultCard">
          <div class="result-header">
            <div class="result-avatar" id="resultAvatar">
              <img id="resultAvatarImage" alt="">
              <span id="resultAvatarFallback">SALT</span>
            </div>
            <div>
              <p class="panel-kicker">你希望伴侣的依恋模式</p>
              <div class="result-code" id="resultCode">S+A+L+T+</div>
              <h2 class="result-title" id="resultTitle">结果标题</h2>
            </div>
          </div>

          <p class="result-description" id="resultDescription"></p>
          <p class="result-tagline hidden" id="resultTagline"></p>
          <p class="result-roles hidden" id="resultRoles"></p>

          <div class="result-section">
            <div class="answer-code-line">
              <span>答案码</span>
              <code id="answerCodeText">生成中...</code>
              <button class="tiny-text-button" id="toggleAnswerCodeButton" type="button">隐藏</button>
              <button class="tiny-text-button" id="decodeToggleButton" type="button">解析</button>
            </div>
            <div class="type-layer-grid" id="typeLayerGrid"></div>
          </div>

          <div class="result-section">
            <h3>S / A / L / T 概览</h3>
            <div class="score-list" id="scoreList"></div>
          </div>

          <div class="result-section">
            <h3>我会给出 / 我期待对方</h3>
            <div class="comparison-list" id="comparisonList"></div>
          </div>

          <div class="result-section">
            <h3>关系差值</h3>
            <div id="gapCard"></div>
          </div>

          <div class="result-section">
            <h3>支持偏好</h3>
            <div class="support-ranking" id="supportRanking"></div>
            <p class="support-analysis" id="supportAnalysis"></p>
          </div>

          <div class="result-section profile-section hidden" id="profileSection">
            <h3>完整分析</h3>
            <div class="profile-grid" id="profileGrid"></div>
          </div>

          <div class="decoder-panel hidden" id="decoderPanel">
            <textarea id="answerCodeInput" rows="4" spellcheck="false" placeholder="粘贴 SALT1A 或 SALT1X 开头的答案码"></textarea>
            <button class="primary-button compact-button" id="decodeButton" type="button">解析</button>
            <pre id="decodeOutput"></pre>
          </div>
        </div>

        <div class="panel-actions result-actions">
          <button class="ghost-button" id="resultBackButton" type="button">返回修改</button>
          <button class="ghost-button" id="restartResultButton" type="button">重新开始</button>
          <button class="ghost-button" id="saveImageButton" type="button">保存结果图</button>
          <button class="ghost-button" id="shareButton" type="button">分享结果</button>
          <button class="primary-button" id="copyButton" type="button">复制结果文案</button>
        </div>
      </section>
    </section>
  </main>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
